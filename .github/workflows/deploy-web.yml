name: deploy-web

# Builds the static dashboard and SFTP-pushes it to the cPanel host from a
# clean GitHub-runner IP. This means dashboard changes ship without needing the
# SFTP password on a local machine (or a non-firewall-blocked home IP) — you can
# even trigger it from the GitHub mobile app (Actions tab -> Run workflow).

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  schedule:
    - cron: "30 5 * * *" # daily rebuild so the SSG'd /accuracy + new /recap pages stay fresh
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        # npm install (not `npm ci`): the lockfile is generated on Windows and
        # omits the Linux @esbuild/* optional binaries, which `npm ci` rejects.
        run: npm install --no-audit --no-fund

      - name: Test (gate the deploy on green tests)
        working-directory: web
        run: npm test

      - name: Refresh SSG data from the live host (fall back to committed fixtures)
        working-directory: web
        run: |
          for f in scores extras seo latest history; do
            curl -fsS --max-time 25 "https://vadym.online/btc/data/$f.json" -o "public/data/$f.json" \
              && echo "pulled $f.json" || echo "keeping committed fixture $f.json"
          done

      - name: Build static export (-> web/out)
        working-directory: web
        run: npm run build

      - name: Drop bundled sample data so we never clobber the engine's live data
        run: rm -rf web/out/data

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install paramiko
        run: pip install -q paramiko

      - name: Deploy dashboard to cPanel (SFTP)
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USER }}
          SSH_PASS: ${{ secrets.SFTP_PASS }}
        run: python deploy/sftp_upload.py web/out public_html/btc
