name: hourly-forecast

on:
  schedule:
    - cron: "9 * * * *"      # ~hourly (GitHub cron is best-effort, may drift a few min)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # to update the 'state' branch (forecast-history db)

concurrency:
  group: hourly-forecast
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    env:
      HC_PING_URL: ${{ secrets.HC_PING_URL }}   # optional healthchecks.io dead-man-switch
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -r requirements.txt
          pip install -q -e .
          pip install -q paramiko

      - name: Restore forecast-history db (from 'state' branch)
        run: |
          mkdir -p state public_html/btc/data
          if git fetch origin state 2>/dev/null; then
            git show origin/state:oracle.db > state/oracle.db && echo "restored prior db" || echo "no db on state branch yet"
          else
            echo "no state branch yet -- starting fresh"
          fi

      - name: Run the hourly forecast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH: ./state/oracle.db
          SNAPSHOT_DIR: ./public_html/btc/data
        run: python -m btc_oracle.cli run

      - name: Back up forecast-history db (artifact, 30-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: oracle-db
          path: state/oracle.db
          retention-days: 30
          overwrite: true

      # Persist the durable forecast-history db to the 'state' branch BEFORE the
      # live push, so a crash between the two can never publish a forecast that
      # has no durable record to ever resolve/score (a silent track-record hole).
      - name: Save forecast-history db (single-commit 'state' branch, no history bloat)
        run: |
          git config user.name "btc-oracle-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp state/oracle.db "$RUNNER_TEMP/oracle.db"
          git checkout --orphan state-new
          git reset
          cp "$RUNNER_TEMP/oracle.db" oracle.db
          git add -f oracle.db
          git commit -q -m "forecast-history @ $(date -u +%FT%TZ)"
          git push -f origin state-new:state

      - name: Push snapshots to cPanel host (SFTP)
        env:
          SSH_HOST: ${{ secrets.SFTP_HOST }}
          SSH_PORT: ${{ secrets.SFTP_PORT }}
          SSH_USER: ${{ secrets.SFTP_USER }}
          SSH_PASS: ${{ secrets.SFTP_PASS }}
        run: python deploy/sftp_upload.py public_html/btc/data public_html/btc/data

      - name: Healthcheck ping (success)
        if: ${{ success() && env.HC_PING_URL != '' }}
        run: curl -fsS -m 10 "$HC_PING_URL" || true

      - name: Healthcheck ping (failure)
        if: ${{ failure() && env.HC_PING_URL != '' }}
        run: curl -fsS -m 10 "$HC_PING_URL/fail" || true
